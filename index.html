<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludo Royale - Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0F172A;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
</head>
<body class="p-6">
    <div class="text-center">
        <h1 class="text-4xl font-black mb-2">LUDO<span class="text-orange-500">ROYALE</span></h1>
        <p class="text-slate-500 text-xs mb-8 tracking-widest uppercase">Pass and Play Edition</p>
        
        <div class="space-y-4">
            <button onclick="alert('Turn: Red Player - Roll karein!')" class="bg-orange-500 py-4 px-8 rounded-xl font-bold w-72 block mx-auto">
                🎲 ROLL DICE (RED)
            </button>
            <button onclick="alert('Turn: Blue Player - Roll karein!')" class="bg-blue-600 py-4 px-8 rounded-xl font-bold w-72 block mx-auto">
                🎲 ROLL DICE (BLUE)
            </button>
        </div>
        <p class="text-slate-600 text-xs mt-8">Ek hi mobile me बारी-बारी (Turn-by-turn) khele!</p>
    </div>
</body>
</html>
